name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12", "3.13", "3.13t", "3.14", "3.14t"]
        include:
          # 3.15 is prerelease: informational rows, allowed to fail
          - os: ubuntu-latest
            python-version: "3.15"
            experimental: true
          - os: ubuntu-latest
            python-version: "3.15t"
            experimental: true
    continue-on-error: ${{ matrix.experimental || false }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest
      - name: Report interpreter mode
        run: |
          python -c "import sys, immortalize as im; print(sys.version); print('available:', im.available(), 'free_threaded:', im.is_free_threaded())"
      - name: Assert availability matches the known matrix
        # Two-way guard: the suite must not silently all-skip where the
        # symbol should exist, and we want to KNOW when a build starts (or
        # stops) exporting it.  Measured across GH-hosted Linux/macOS/Windows:
        # _Py_SetImmortal is ctypes-visible on standard 3.14+ builds and NOT
        # on 3.12/3.13/3.13t (source-present but unexported pre-3.14).
        shell: bash
        run: |
          python - <<'EOF'
          import sys
          import immortalize as im
          expected = sys.version_info[:2] >= (3, 14)
          actual = im.available()
          print(f"python {sys.version_info[0]}.{sys.version_info[1]} "
                f"expected_available={expected} actual={actual}")
          assert actual == expected, (
              f"availability changed on this build: expected {expected}, "
              f"got {actual} -- update the matrix note and README")
          EOF
      - name: Test
        run: python -m pytest tests/ -v

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
